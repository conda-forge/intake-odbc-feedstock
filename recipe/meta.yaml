{% set name = "intake-odbc" %}
{% set version = "0.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/intake-odbc-{{ version }}.tar.gz
  sha256: 696c61ac767676bd46137907f7b57b08619a087d9ace2182f4ca400a88d9f473

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 1

requirements:
  host:
    - python {{ python_min }}
    - pip
  run:
    - python >={{ python_min }}
    - intake
    - turbodbc
    - pyarrow
    - pandas

test:
  imports:
    - intake_odbc
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/intake/intake-odbc
  summary: ODBC Plugin for Intake
  license: BSD-2-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - martindurant
    - blakerosenthal
